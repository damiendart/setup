---
- name: 'Get Ubuntu Pro status'
  ansible.builtin.command: 'pro status --all'
  changed_when: false
  register: __ubuntu_pro_status

- name: 'Ensure the host has an active Ubuntu Pro subscription'
  ansible.builtin.command: 'pro attach {{ ubuntu_pro__subscription_token }}'
  changed_when: __ubuntu_pro_attach.rc == 0
  no_log: true
  register: __ubuntu_pro_attach
  when: "'This machine is not attached to an Ubuntu Pro subscription.' in __ubuntu_pro_status.stdout"

- name: 'Ensure Canonical Livepatch is enabled'
  ansible.builtin.command: 'pro enable livepatch'
  changed_when: __ubuntu_pro_enable_livepatch.rc == 0
  register: __ubuntu_pro_enable_livepatch
  when: __ubuntu_pro_status.stdout is search('livepatch\s+yes\s+disabled')
